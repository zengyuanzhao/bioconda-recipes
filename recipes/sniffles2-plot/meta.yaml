{% set name = "sniffles2-plot" %}
{% set version = "0.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 938a5dda606f4221cec905ecc72542f4fc461e55b8ec9533c62d55fcd2c43fee

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}
  entry_points:
    - sniffles2_plot = sniffles2_plot.cli:entry_point

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
  run:
    - python >=3.8
    - seaborn >=0.11.0,<1
    - upsetplot >=0.8.0,<1
    - pandas >=1.1.3,<2
    - matplotlib-base >=3.3.2,<4
    - numpy <2

test:
  imports:
    - sniffles2_plot
  commands:
    - sniffles2_plot --help

about:
  home: https://github.com/farhangus/Sniffles2_plot
  license: Unknown
  summary: A visualizer tool for generating plots from Sniffles2 VCF files.

extra:
  recipe-maintainers:
    - nourmahfel
